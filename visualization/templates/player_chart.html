<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { 
            background: white; 
            padding: 20px; 
            font-family: 'Microsoft YaHei', sans-serif;
            width: 800px;
            margin: 0 auto;
        }
        h2 { 
            text-align: center; 
            color: #333;
            margin: 10px 0 5px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .chart-container {
            position: relative;
            height: 400px;
            width: 100%;
        }
        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 8px;
        }
        .stat-item {
            text-align: center;
        }
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #4ECDC4;
        }
        .stat-label {
            font-size: 14px;
            color: #666;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <h2>🎴 {{ player_name }} 分数趋势</h2>
    <div class="subtitle">最近 {{ count }} 局对局 | 单位：点</div>
    
    <div class="chart-container">
        <canvas id="scoreChart"></canvas>
    </div>
    
    <div class="stats">
        <div class="stat-item">
            <div class="stat-value">{{ avg_score }}</div>
            <div class="stat-label">平均得分</div>
        </div>
        <div class="stat-item">
            <div class="stat-value">{{ best_score }}</div>
            <div class="stat-label">最高得分</div>
        </div>
        <div class="stat-item">
            <div class="stat-value">{{ worst_score }}</div>
            <div class="stat-label">最低得分</div>
        </div>
    </div>
    
    <script>
        const ctx = document.getElementById('scoreChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: {{ dates|safe }},
                datasets: [{
                    label: '{{ player_name }}',
                    data: {{ scores|safe }},
                    borderColor: '#4ECDC4',
                    backgroundColor: '#4ECDC420',
                    tension: 0.3,
                    pointRadius: 4,
                    pointHoverRadius: 6,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                return context.raw + '点';
                            }
                        }
                    }
                },
                scales: {
                    y: {
                        beginAtZero: false,
                        title: {
                            display: true,
                            text: '分数'
                        }
                    }
                }
            }
        });
    </script>
</body>
</html>
